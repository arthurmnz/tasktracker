version: "3.8"

networks:
  app-network:
    driver: overlay
    attachable: true
    name: tasktracker-network

services:
  postgres:
    image: postgres:15
    networks:
      - app-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tasktracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasktracker}
      POSTGRES_DB: ${POSTGRES_DB:-tasktracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasktracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/arthurmnz/tasktracker:latest
    networks:
      - app-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tasktracker}:${POSTGRES_PASSWORD:-tasktracker}@postgres:5432/${POSTGRES_DB:-tasktracker}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      - postgres

volumes:
  postgres_data:
